# LibreLane Classic-flow hardening config for the Token Importance Unit macro.
#
# STATUS: REAL RTL (token_importance_unit, H2O heavy-hitter eviction core) —
# signed off on Sky130 in this block's pdk/sky130/openlane/token_importance_unit.
# Re-targeted to GF180MCU here. Ported from that repo's config.json.
#
# Provenance: ../../../../chip/pdk/gf180/PROVENANCE.md

meta:
  version: 3
  flow: Classic

DESIGN_NAME: token_importance_unit

PDK: gf180mcuD

VERILOG_FILES:
  - dir::../../../rtl/token_importance_unit.sv

SYNTH_PARAMETERS:
  - N_SLOTS=4

CLOCK_PORT: clk
CLOCK_NET: clk
CLOCK_PERIOD: 40     # ns — GF180 retime (loose start)

FP_SIZING: relative
FP_CORE_UTIL: 40
PL_TARGET_DENSITY_PCT: 50

DESIGN_IS_CORE: false
IO_DELAY_CONSTRAINT: 5
CLOCK_UNCERTAINTY_CONSTRAINT: 0.1
# NOTE: the Sky130 config's MAX_TRANSITION_CONSTRAINT: 1.5 / MAX_FANOUT: 20 were
# dropped — on the slower GF180 cells they sent OpenROAD's repair_design into a
# non-converging slew-repair loop. GF180 PDK default max-transition is used.
GRT_ALLOW_CONGESTION: true
